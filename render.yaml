services:
  - type: web
    name: paynest-api
    env: node
    region: oregon
    buildCommand: npm ci && npm run preflight:env && npm run build-check
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3000"

      # CRITICAL: App URL for production (set to your Render URL)
      - key: APP_URL
        sync: false
      - key: APP_ORIGIN
        sync: false

      # CORS: Set to your Vercel frontend URL
      - key: CORS_ORIGIN
        sync: false

      # Database (Supabase)
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false

      # Redis (Upstash). The app and preflight also support REDIS_URL; this blueprint uses split vars.
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"

      # Auth
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: VIEWER_PASSWORD
        sync: false

      # Gateway secrets (sandbox values)
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_ENVIRONMENT
        value: "sandbox"
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
